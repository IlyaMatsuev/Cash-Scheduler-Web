<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cash Scheduler</title>

    <link rel="icon" href="/img/icon.ico">
    <link rel="stylesheet" href="/css/bootstrap/bootstrap.css">
    <link rel="stylesheet" href="/css/login/header.css">
    <link rel="stylesheet" href="/css/main.css">
</head>
<body>
<header>
    <nav class="navbar fixed-top navbar-expand-lg navbar-dark scrolling-navbar">
        <a class="navbar-brand" href="javascript:void(0)"><strong>Cash Scheduler</strong></a>

        <!-- Button appears when the screen width becomes small -->
        <button class="navbar-toggler" type="button"
                data-toggle="collapse" data-target="#navbarSupportedContent"
                aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="nav navbar-nav mr-auto">
                <li class="nav-item">
                    <a class="nav-link" href="https://github.com/IlyaMatsuev/Cash-Scheduler-Web">Download the App</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="https://github.com/IlyaMatsuev/Cash-Scheduler-Web">Link1</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="https://github.com/IlyaMatsuev/Cash-Scheduler-Web">Link2</a>
                </li>
            </ul>
        </div>
    </nav>

    <div class="login-view header-background">
        <div class="container">
            <div class="row">
                <div class="col-md ads-container">
                    <div class="ads">
                        <p>Everything is possible for you!</p>
                        <p>Attach your card right now</p>
                        <div>
                            <button>Learn more</button>
                        </div>
                    </div>
                </div>
                <div class="col-md">
                    <div class="form-container active-form">
                        <div class="form-wrapper">
                            <form action="/auth/login" method="post" onsubmit="return login()">
                                <div class="form-title">
                                    <a href="javascript:void(0)" class="active-header">Sign In</a>
                                    &nbsp;&nbsp;
                                    <a href="javascript:switchForm()" class="non-active-header">Sign Up</a>
                                </div>

                                <div class="form-input">
                                    <input type="email" name="email" placeholder="Email" required>
                                    <span></span>
                                </div>

                                <div class="form-input">
                                    <input type="password" name="password" placeholder="Password" required>
                                    <span></span>
                                </div>

                                <div class="login-links">
                                    <div class="login-remember-me">
                                        <input class="input-checkbox100" id="remember-me" type="checkbox"
                                               name="remember">
                                        <label class="label-checkbox100" for="remember-me">Remember?</label>
                                    </div>

                                    <div class="login-forgot">
                                        <a href="javascript:forgotPassword()">Forgot?</a>
                                    </div>
                                </div>

                                <div class="login-errors">
                                    <span></span>
                                </div>

                                <div class="form-submit-button">
                                    <button>Login</button>
                                </div>
                            </form>
                        </div>
                    </div>

                    <div class="form-container non-active-form">
                        <div class="form-wrapper">
                            <form action="/auth/register" method="post" onsubmit="return register()">
                                <div class="form-title">
                                    <a href="javascript:switchForm()" class="non-active-header" style="left: 7%;">Sign In</a>
                                    &nbsp;&nbsp;
                                    <a href="javascript:void(0)" class="active-header">Sign Up</a>
                                </div>

                                <div class="form-input">
                                    <input type="email" name="email" placeholder="Email" required>
                                    <span></span>
                                </div>

                                <div class="form-input">
                                    <input type="password" name="password" placeholder="Password" required>
                                    <span></span>
                                </div>

                                <div class="form-input">
                                    <input type="password" name="confirmedPassword" placeholder="Confirm Password" required>
                                    <span></span>
                                </div>

                                <div class="login-errors">
                                    <span></span>
                                </div>

                                <div class="form-submit-button">
                                    <button>Register</button>
                                </div>
                            </form>
                        </div>
                    </div>

                    <div class="form-container forgot-form forgot-form-hide">
                        <div class="form-wrapper">
                            <form onsubmit="return false;">
                                <div class="form-title">
                                    <span class="active-header">Forgot Password?</span>
                                </div>

                                <div class="forgot-email-step-wrapper">
                                    <div class="form-input">
                                        <input type="text" name="email" placeholder="Email">
                                        <span></span>
                                    </div>

                                    <div class="form-submit-button">
                                        <button onclick="sendVerificationCode()">Send Code</button>
                                    </div>
                                </div>

                                <div class="forgot-code-step-wrapper">
                                    <div class="form-input">
                                        <input type="text" name="code" placeholder="Code">
                                        <span></span>
                                    </div>

                                    <div class="form-submit-button">
                                        <button onclick="compareVerificationCodes()">Check</button>
                                    </div>
                                </div>

                                <div class="forgot-change-password-step-wrapper">
                                    <div class="form-input">
                                        <input type="text" name="password" placeholder="New Password">
                                        <span></span>
                                    </div>

                                    <div class="form-submit-button">
                                        <button onclick="changePassword()">Change Password</button>
                                    </div>
                                </div>

                                <div class="form-submit-button form-back-button">
                                    <button onclick="goBack()">Go Back</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</header>

<script src="./js/jQuery/jquery.min.js"></script>
<script src="./js/popper/popper.min.js"></script>
<script src="./js/bootstrap/bootstrap.min.js"></script>
<script src="./js/main/login/index.js"></script>
<script src="./js/main.js"></script>
</body>
</html>
