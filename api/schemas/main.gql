type User {
    id: Int!
    first_name: String
    last_name: String
    email: String!
    password: String!
}

type TransactionType {
    type_name: String!
    image_url: String!
}

type Category {
    id: Int!
    name: String!
    transaction_type: TransactionType!
    user: User
    is_custom: Boolean!
    image_url: String!
}

type Transaction {
    id: Int!
    title: String
    user: User!
    category: Category!
    amount: Float!
    date: String
}

type RegularTransaction {
    id: Int!
    title: String
    user: User!
    category: Category!
    amount: Float!
    next_transaction_date: String!
    interval: String!
}

type Currency {
    abbreviation: String!
    rate: Float!
    icon: String
}


type Query {
    getUserById(id: Int!): User!
    getUserByEmail(email: String!): User!
    getUsers: [User!]

    getTransactionTypes: [TransactionType!]

    getAllCategories: [Category!]
    getStandardCategories: [Category!]
    getCustomCategories: [Category!]


    getAllTransactions(size: Int): [Transaction!]

    getAllRegularTransactions(size: Int): [RegularTransaction!]

    getAllCurrencies: [Currency!]
}
